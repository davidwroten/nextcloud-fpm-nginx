name: Build and Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  Builder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHUB_USERNAME }}
          password: ${{ secrets.GHUB_PASSWORD }}

      - name: Extract Nextcloud version from Dockerfile
        id: nc
        run: |
          BASE=$(grep '^FROM nextcloud:' Dockerfile | awk -F: '{print $2}')
          VERSION="${BASE}"

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push images
        run: |
          docker build \
            -t ghcr.io/davidwroten/nextcloud-fpm-nginx:${{ steps.nc.outputs.VERSION }} \
            -t ghcr.io/davidwroten/nextcloud-fpm-nginx:latest .
          docker push --all-tags ghcr.io/davidwroten/nextcloud-fpm-nginx
